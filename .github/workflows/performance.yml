name: Performance Testing

on:
  workflow_dispatch:

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build site
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Run Lighthouse CI
        run: |
          # Start the preview server in the background
          pnpm preview > preview.log 2>&1 &
          PREVIEW_PID=$!

          # Wait for the server to be ready
          echo "Waiting for preview server to start..."
          if ! pnpm exec wait-on http://localhost:4321 --timeout 30000; then
            echo "Preview server failed to start. Log output:"
            cat preview.log
            exit 1
          fi

          # Run Lighthouse CI
          pnpm perf:collect --url=http://localhost:4321
          pnpm perf:assert
          pnpm perf:upload

          # Clean up preview server
          kill $PREVIEW_PID || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30
