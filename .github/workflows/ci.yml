name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - '*.config.{ts,js,cjs,mjs}'
              - '.github/workflows/**'
              - '.github/actions/setup/**'
              - '.node-version'
            docs:
              - '**/*.md'
              - 'docs/**'

  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache TypeScript and Astro
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-${{ hashFiles('src/**/*.{ts,tsx,astro,svelte}') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Run format check
        run: pnpm format:check

      - name: Run linters
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run spell check
        run: pnpm spellcheck

      - name: Check for unused exports
        run: pnpm knip

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, quality-checks]
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Set Plausible env
        run: |
          if [ -n "${{ secrets.PUBLIC_PLAUSIBLE_SCRIPT_COM }}" ]; then
            echo "PUBLIC_PLAUSIBLE_SCRIPT_COM=${{ secrets.PUBLIC_PLAUSIBLE_SCRIPT_COM }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.PUBLIC_PLAUSIBLE_SCRIPT_CZ }}" ]; then
            echo "PUBLIC_PLAUSIBLE_SCRIPT_CZ=${{ secrets.PUBLIC_PLAUSIBLE_SCRIPT_CZ }}" >> "$GITHUB_ENV"
          fi

      - name: Build project
        run: pnpm build
        env:
          NODE_ENV: production
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}

      - name: Validate security headers
        run: pnpm validate:security

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
          compression-level: 9

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=ambilab-website
