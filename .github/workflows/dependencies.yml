name: Dependency Check

on:
  schedule:
    # Run weekly on Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check for outdated dependencies
        id: outdated
        run: |
          pnpm outdated --format json > outdated.json || true
          cat outdated.json

      - name: Upload outdated report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: outdated-dependencies
          path: outdated.json
          retention-days: 30

  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run security audit
        run: pnpm audit --audit-level=moderate --json > audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-audit
          path: audit.json
          retention-days: 30
