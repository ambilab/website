name: Setup
description: Install Node.js, pnpm, and dependencies
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'
        cache: 'pnpm'

    - run: pnpm install --frozen-lockfile
      shell: bash
